name: Build and push API image

on:
  workflow_dispatch:
    inputs:
      push_latest:
        description: "Also push :latest"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches:
      - master

env:
  IMAGE_NAME: mirror-ai-agent

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          : "${{ secrets.REGISTRY_HOST }}"
          : "${{ secrets.REGISTRY_NAMESPACE }}"
          image="${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_NAMESPACE }}/${IMAGE_NAME}"
          short_sha="${GITHUB_SHA::12}"
          tags="${image}:${short_sha}"
          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.push_latest || 'true' }}" == "true" ]]; then
            tags="${tags}"$'\n'"${image}:latest"
          fi
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${image}:${short_sha}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
