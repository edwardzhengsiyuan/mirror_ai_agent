<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Billing · Mirror AI</title>
    <link rel="stylesheet" href="/portal.css" />
    <style>
      .pack-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
      }
      .pack {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-2);
        padding: 16px;
        cursor: pointer;
        transition: border-color 0.1s, box-shadow 0.1s, transform 0.05s;
      }
      .pack:hover {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
      }
      .pack:active {
        transform: translateY(1px);
      }
      .pack .pack-name {
        font-weight: 600;
        font-size: 15px;
        color: var(--ink);
      }
      .pack .pack-price {
        font-size: 22px;
        font-weight: 600;
        font-family: var(--font-mono);
        margin-top: 6px;
        color: var(--ink);
      }
      .pack .pack-credits {
        font-size: 13px;
        color: var(--muted);
        margin-top: 4px;
      }
      .pack .pack-badge {
        display: inline-block;
        font-size: 11px;
        color: var(--accent);
        background: var(--accent-soft);
        padding: 2px 6px;
        border-radius: 4px;
        margin-top: 8px;
        font-weight: 500;
      }
      .custom-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .custom-row input {
        max-width: 180px;
      }
    </style>
  </head>
  <body>
    <header class="topnav">
      <a href="/dashboard" class="brand">
        <span class="brand-dot"></span>
        Mirror AI
      </a>
      <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/billing" class="active">Billing</a>
        <a href="/docs">Docs</a>
      </nav>
      <div class="user-block">
        <span id="user-email" class="muted"></span>
        <button id="logout-btn" class="btn btn-ghost btn-sm">登出</button>
      </div>
    </header>

    <main class="page">
      <h1>充值</h1>
      <p class="text-muted">为账户增加 credits — 每次 API 调用按 endpoint 价格扣费。</p>

      <div id="banner" class="banner hidden"></div>

      <div class="grid cols-2 mt-6">
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">当前余额</div>
              <div class="card-subtitle">credits</div>
            </div>
            <button id="refresh-balance-btn" class="btn btn-ghost btn-sm">刷新</button>
          </div>
          <div
            id="balance"
            style="font-size:28px;font-weight:600;font-family:var(--font-mono);"
          >
            —
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">支付方式</div>
          </div>
          <div id="payment-info" class="muted" style="font-size:13px;">
            加载中…
          </div>
        </div>
      </div>

      <div class="card mt-6">
        <div class="card-header">
          <div>
            <div class="card-title">充值套餐</div>
            <div class="card-subtitle">点击套餐跳转 Stripe Checkout</div>
          </div>
        </div>
        <div id="pack-grid" class="pack-grid">
          <div class="text-muted">加载套餐…</div>
        </div>
        <div class="mt-6">
          <h4 style="margin-bottom: 8px;">自定义金额</h4>
          <div class="custom-row">
            <input
              type="number"
              id="custom-yuan"
              placeholder="¥ (1–9999)"
              min="1"
              max="9999"
            />
            <button id="custom-btn" class="btn btn-primary">充值</button>
          </div>
          <small class="text-muted">汇率：1 元 = 100 credits（实际比率以服务器配置为准）</small>
        </div>
      </div>

      <div class="card mt-6">
        <div class="card-header">
          <div>
            <div class="card-title">最近账单</div>
            <div class="card-subtitle">充值与扣费明细</div>
          </div>
        </div>
        <table class="table">
          <thead>
            <tr>
              <th>时间</th>
              <th>Endpoint</th>
              <th>类型</th>
              <th>变动</th>
              <th>余额</th>
            </tr>
          </thead>
          <tbody id="ledger-body">
            <tr>
              <td colspan="5" class="table-empty">加载中…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script src="/portal.js"></script>
    <script>
      (function () {
        const state = {
          me: null,
          apiKey: null,
          packs: [],
          currency: "cny",
          stripeConfigured: false,
        };
        const els = {
          banner: document.getElementById("banner"),
          balance: document.getElementById("balance"),
          paymentInfo: document.getElementById("payment-info"),
          userEmail: document.getElementById("user-email"),
          packGrid: document.getElementById("pack-grid"),
          customYuan: document.getElementById("custom-yuan"),
          customBtn: document.getElementById("custom-btn"),
          ledgerBody: document.getElementById("ledger-body"),
          refreshBalanceBtn: document.getElementById("refresh-balance-btn"),
          logoutBtn: document.getElementById("logout-btn"),
        };

        async function refreshBalance() {
          if (!state.apiKey) {
            els.balance.textContent =
              state.me.user.balance_credits.toLocaleString();
            return;
          }
          try {
            const out = await Portal.apiCallWithKey("GET", "/v1/balance", state.apiKey);
            els.balance.textContent = (out.balance_credits ?? 0).toLocaleString();
          } catch (err) {
            Portal.showError(els.banner, "刷新余额失败：" + err.message);
          }
        }

        async function loadPacks() {
          try {
            const out = await Portal.apiCall("GET", "/v1/topup_packs");
            state.packs = out.packs || [];
            state.currency = out.currency || "cny";
            state.stripeConfigured = !!out.stripe_configured;
            if (!state.stripeConfigured) {
              els.paymentInfo.innerHTML =
                '<span style="color:var(--warn);">⚠ Stripe 暂未配置 — 联系运营开通后再充值。</span>';
            } else {
              const methods = (out.payment_methods || []).join(", ") || "card";
              els.paymentInfo.textContent =
                "支付方式：" + methods + "（mode: " + out.stripe_mode + "）";
            }
            renderPacks();
          } catch (err) {
            els.packGrid.innerHTML =
              '<span class="text-muted">加载套餐失败：' + err.message + "</span>";
          }
        }

        function renderPacks() {
          if (!state.packs.length) {
            els.packGrid.innerHTML =
              '<span class="text-muted">暂无预设套餐。试试下面的自定义金额。</span>';
            return;
          }
          els.packGrid.innerHTML = state.packs
            .map((p) => {
              const badge = p.most_popular
                ? '<div class="pack-badge">最受欢迎</div>'
                : p.best_value
                ? '<div class="pack-badge">超值</div>'
                : "";
              return (
                '<div class="pack" data-pack-id="' +
                p.id +
                '">' +
                '<div class="pack-name">' +
                (p.name || p.id) +
                "</div>" +
                '<div class="pack-price">' +
                Portal.formatYuan(p.amount_fen) +
                "</div>" +
                '<div class="pack-credits">' +
                p.credits.toLocaleString() +
                " credits</div>" +
                badge +
                "</div>"
              );
            })
            .join("");
          Array.from(els.packGrid.querySelectorAll(".pack")).forEach((node) => {
            node.addEventListener("click", () => {
              checkout({ pack_id: node.dataset.packId });
            });
          });
        }

        async function checkout(body) {
          if (!state.apiKey) {
            Portal.showError(
              els.banner,
              "缺少 API key — 回 Dashboard 点「重置 Key」生成一个。"
            );
            return;
          }
          if (!state.stripeConfigured) {
            Portal.showError(els.banner, "Stripe 尚未配置。");
            return;
          }
          Portal.clearBanner(els.banner);
          try {
            const out = await Portal.apiCallWithKey(
              "POST",
              "/v1/checkout/create",
              state.apiKey,
              body
            );
            window.location.href = out.checkout_url;
          } catch (err) {
            Portal.showError(els.banner, err.message || "创建支付会话失败");
          }
        }

        els.customBtn.addEventListener("click", () => {
          const val = parseInt(els.customYuan.value, 10);
          if (!val || val < 1 || val > 9999) {
            Portal.showError(els.banner, "请输入 1–9999 之间的整数元数");
            return;
          }
          checkout({ custom_yuan: val });
        });
        els.refreshBalanceBtn.addEventListener("click", async () => {
          await refreshBalance();
          await loadLedger();
        });
        els.logoutBtn.addEventListener("click", Portal.logout);

        async function loadLedger() {
          if (!state.apiKey) {
            els.ledgerBody.innerHTML =
              '<tr><td colspan="5" class="table-empty">缺少 API key — 重置后可看历史账单。</td></tr>';
            return;
          }
          try {
            const out = await Portal.apiCallWithKey(
              "GET",
              "/v1/usage?limit=30",
              state.apiKey
            );
            const rows = out.rows || [];
            if (!rows.length) {
              els.ledgerBody.innerHTML =
                '<tr><td colspan="5" class="table-empty">还没有账单记录。</td></tr>';
              return;
            }
            els.ledgerBody.innerHTML = rows
              .map((r) => {
                const sign = r.amount_credits > 0 ? "+" : "";
                const cls =
                  r.kind === "topup"
                    ? "color:var(--ok);"
                    : r.kind === "refund"
                    ? "color:var(--accent);"
                    : "color:var(--ink-2);";
                return (
                  "<tr>" +
                  "<td class='mono' style='font-size:12px;'>" +
                  Portal.formatTs(r.ts) +
                  "</td>" +
                  "<td class='mono' style='font-size:12px;'>" +
                  (r.endpoint || "—") +
                  "</td>" +
                  "<td>" +
                  r.kind +
                  "</td>" +
                  "<td class='mono' style='" +
                  cls +
                  "'>" +
                  sign +
                  r.amount_credits +
                  "</td>" +
                  "<td class='mono'>" +
                  r.balance_after +
                  "</td>" +
                  "</tr>"
                );
              })
              .join("");
          } catch (err) {
            els.ledgerBody.innerHTML =
              '<tr><td colspan="5" class="table-empty" style="color:var(--danger);">加载失败：' +
              err.message +
              "</td></tr>";
          }
        }

        (async () => {
          const me = await Portal.requireSession();
          state.me = me;
          state.apiKey = (me.api_key && me.api_key.plaintext) || null;
          els.userEmail.textContent = me.user.email || me.user.user_id;
          els.balance.textContent = (me.user.balance_credits ?? 0).toLocaleString();
          // Stripe redirect handling. New STRIPE_SUCCESS_URL uses ``topup=``;
          // older deployments may still use ``status=`` — we handle both so
          // we don't surprise existing customers when they redeploy.
          const params = new URLSearchParams(window.location.search);
          const topup = params.get("topup") || params.get("status");
          if (topup === "success") {
            Portal.showOk(
              els.banner,
              "支付成功！credits 会在收到 Stripe webhook 后入账，几秒钟刷新一下看看。"
            );
          } else if (topup === "cancel" || topup === "cancelled") {
            Portal.showWarn(els.banner, "支付已取消。");
          }
          await Promise.all([loadPacks(), refreshBalance(), loadLedger()]);
        })();
      })();
    </script>
  </body>
</html>
