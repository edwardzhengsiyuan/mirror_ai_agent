<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 · Mirror AI</title>
    <link rel="stylesheet" href="/portal.css" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <a href="/" style="display: flex; justify-content: center; margin-bottom: 24px; text-decoration: none;">
          <span style="display: flex; align-items: center; gap: 8px; font-weight: 600; color: var(--ink); font-size: 16px;">
            <span class="brand-dot" style="width:20px;height:20px;border-radius:5px;background:linear-gradient(135deg,var(--accent),#6366f1);"></span>
            Mirror AI
          </span>
        </a>
        <h1>登录</h1>
        <p class="auth-sub">使用注册时的邮箱登录开发者后台</p>

        <div id="banner" class="banner hidden"></div>

        <form id="login-form" novalidate>
          <div class="form-row">
            <label for="email">邮箱</label>
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              placeholder="dev@yourcompany.com"
              required
            />
          </div>
          <div class="form-row">
            <label for="password">密码</label>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              required
            />
          </div>
          <button type="submit" id="submit-btn" class="btn btn-primary btn-block">登录</button>
        </form>

        <div class="auth-footer">
          还没有账号？ <a href="/register">注册</a>
        </div>
      </div>
    </div>

    <script src="/portal.js"></script>
    <script>
      (function () {
        const form = document.getElementById("login-form");
        const btn = document.getElementById("submit-btn");
        const banner = document.getElementById("banner");

        // If already logged in, skip the form and go to dashboard / next.
        Portal.fetchMe()
          .then(() => {
            const next = new URLSearchParams(window.location.search).get("next") || "/dashboard";
            window.location.href = next;
          })
          .catch(() => {
            /* expected — not logged in yet */
          });

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          Portal.clearBanner(banner);
          btn.disabled = true;
          btn.textContent = "登录中…";
          try {
            await Portal.apiCall("POST", "/v1/auth/login", {
              email: document.getElementById("email").value.trim(),
              password: document.getElementById("password").value,
            });
            const next = new URLSearchParams(window.location.search).get("next") || "/dashboard";
            window.location.href = next;
          } catch (err) {
            Portal.showError(banner, err.message || "登录失败");
            btn.disabled = false;
            btn.textContent = "登录";
          }
        });
      })();
    </script>
  </body>
</html>
