x-logging: &default-logging
  # Docker's default json-file driver has no size cap, so a noisy week can
  # fill the host disk. Cap each container at ~250MB of logs.
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  bazi-agent-api:
    build: .
    container_name: bazi-agent-api
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
    expose:
      - "8000"
    logging: *default-logging

  caddy:
    image: caddy:2
    container_name: bazi-agent-caddy
    depends_on:
      - bazi-agent-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    logging: *default-logging

volumes:
  caddy_data:
  caddy_config:
