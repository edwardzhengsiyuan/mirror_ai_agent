services:
  bazi-agent-api:
    build: .
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
    expose:
      - "8000"

  caddy:
    image: caddy:2
    depends_on:
      - bazi-agent-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
